name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firebase-deploy-live
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Write firebase-config.js from secret
        run: printf '%s' "${{ secrets.FIREBASE_CONFIG_JS }}" > firebase-config.js

      - name: Deploy hosting and firestore rules
        uses: w9jds/firebase-action@v14.10.1
        with:
          args: deploy --only hosting,firestore:rules --non-interactive --project d-plus-day
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_D_PLUS_DAY }}
